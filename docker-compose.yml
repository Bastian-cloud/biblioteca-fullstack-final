      context: ./entorno-desarrollo-multa/codigo-fuente/multa
    container_name: entorno-desarrollo-multa
    ports:
      - "8085:8085"
    depends_on:
      mysql_servidor:
        condition: service_healthy
    networks:
      - backend-net

  entorno-desarrollo-reserva:

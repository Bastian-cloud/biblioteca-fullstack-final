spring.application.name=multa

server.port=8085

prestamo.service.url=http://entorno-desarrollo-prestamo:8082

spring.datasource.url=jdbc:mysql://mysql_servidor:3306/universidad_backend
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
# Valor de multa por cada día de retraso
multa.valor-por-dia=1000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Configuración de Eureka Client
eureka.client.service-url.defaultZone=http://54.157.198.48:8761/eureka/
eureka.instance.prefer-ip-address=true